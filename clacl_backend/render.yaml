services:
  - type: web
    name: clac-frontend
    runtime: node
    rootDir: clack_frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NEXT_PUBLIC_MONAD_RPC
        sync: false
      - key: NEXT_PUBLIC_MONAD_WS
        sync: false
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false
      - key: NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_CLAC_FACTORY_ADDRESS
        sync: false
      - key: NEXT_PUBLIC_CLAC_FACTORY_V2_ADDRESS
        sync: false

  - type: web
    name: clac-backend
    runtime: node
    rootDir: clacl_backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: DATABASE_URL
        sync: false
      - key: MONAD_RPC_URL
        sync: false
      - key: MONAD_WS_URL
        sync: false
      - key: MONAD_CONTRACT_ADDRESS
        sync: false
      - key: MONAD_FACTORY_V2_ADDRESS
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: RATE_LIMIT_TTL_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 120
      - key: WS_MAX_CONNECTIONS_PER_IP
        value: 5
      - key: MONAD_FINALITY_BLOCKS
        value: 3
      - key: MONAD_REPLAY_BLOCKS
        value: 20
      - key: MONAD_INITIAL_BACKFILL_BLOCKS
        value: 5000
      - key: MONAD_MAX_LOG_RANGE
        value: 100
